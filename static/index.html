<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trakt Migration</title>
    <link rel="stylesheet" href="/main.css" />
</head>

<body>
    <h1>Trakt Migration</h1>
    <p class="sf-indicator">
        <span class="trakt-status status-dot status-red"></span>
        <span class="status-text">Trakt</span>
    </p>

    <p class="sf-indicator">
        <span class="pmdb-status status-dot status-red"></span>
        <span class="status-text">PublicMetaDb</span>
    </p>
    <p>Welcome to the Trakt to PublicMetaDb migration website!</p>

    <script language="JavaScript">
        function toggle(source) {
            checkboxes = document.getElementsByName("sync_options");
            for (var checkbox in checkboxes)
                checkboxes[checkbox].checked = source.checked;
        }
    </script>

    <form id="sync-form">
        <input type="checkbox" onClick="toggle(this)" /> Toggle All<br /><br />

        <input type="checkbox" id="sync_watchlist_choice" name="sync_options" value="true" />
        <label for="sync_watchlist_choice"> Sync watchlist</label><br />
        <input type="checkbox" id="sync_lists_choice" name="sync_options" value="true" />
        <label for="sync_lists_choice"> Sync all lists</label><br />
        <input type="checkbox" id="sync_show_watch_history_choice" name="sync_options" value="true" />
        <label for="sync_show_watch_history_choice">
            Sync show watch history</label><br />
        <input type="checkbox" id="sync_movie_watch_history_choice" name="sync_options" value="true" />
        <label for="sync_movie_watch_history_choice">
            Sync movie watch history</label><br />
        <input type="checkbox" id="sync_show_resume_points_choice" name="sync_options" value="true" />
        <label for="sync_show_resume_points_choice">
            Sync show progress/resume points</label><br />
        <input type="checkbox" id="sync_movie_resume_points_choice" name="sync_options" value="true" />
        <label for="sync_movie_resume_points_choice">
            Sync movie progress/resume points</label><br /><br />
        <input type="button" id="sync-submit" value="Submit" />
    </form>
    <br /><br />

    <div class="sf-skill">
        <div class="loader"></div>
        <div class="skill-content">
            <h4 class="skill-title">Migration Progress</h4>
            <p>The progress of your current migration job.</p>
            <div class="skill-bar" style="--bar-width: 0%" data-progress="0%">
                <span></span>
            </div>
        </div>
    </div>

    <button id="view-logs-button">View Migration Logs</button>
    <div class="migration-logs" style="display: none;">
        <h4>Migration Logs</h4>
        <pre id="migration-logs-content"></pre>
    </div>

    <script language="JavaScript">
        const logsButton = document.getElementById("view-logs-button");
        const logsContainer = document.querySelector(".migration-logs");
        const logsContent = document.getElementById("migration-logs-content");

        logsButton.addEventListener("click", () => {
            if (logsContainer.style.display === "none") {
                const logs = localStorage.getItem("migration_logs") || "No logs available.";
                logsContent.textContent = logs;
                logsContainer.style.display = "block";
                logsButton.textContent = "Hide Migration Logs";
            } else {
                logsContainer.style.display = "none";
                logsButton.textContent = "View Migration Logs";
            }
        });
        
        const syncForm = document.getElementById("sync-form");
        const syncSubmitButton = document.getElementById("sync-submit");

        // Explicitly block native form submit so checked boxes are never appended to the URL.
        syncForm.addEventListener("submit", (event) => {
            event.preventDefault();
        });

        syncSubmitButton.addEventListener("click", () => {
            // Build an object where each checkbox id maps to its checked state.
            const syncOptions = Array.from(
                document.querySelectorAll("input[name='sync_options']"),
            ).reduce((options, checkbox) => {
                options[checkbox.id] = checkbox.checked;
                return options;
            }, {});
            fetch("/migrate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify(syncOptions),
            })
                .then((response) => response.json())
                .then((data) => {
                    if (data.success) {
                        alert(data.message);

                        if (data.events_url) {
                            // Store the events URL in local storage so the status page can use it to listen for updates.
                            localStorage.setItem("events_url", data.events_url);
                            localStorage.removeItem("migration_logs"); // Clear any existing logs
                            location.reload(); // Reload the page to update the status indicators
                        }
                    } else {
                        alert("Failed to start sync. Please try again.");
                    }
                });
        });

        function mark_form_as_hidden() {
            const form = document.querySelector("form");
            if (form) {
                form.style.display = "none";
            }
        }

        // Check if the user is authenticated
        fetch("/auth/status")
            .then((response) => response.json())
            .then((data) => {
                const pmdbStatusDot = document.querySelector(".pmdb-status");
                const pmdbStatusText = document.querySelector(
                    ".pmdb-status + .status-text",
                );
                const traktStatusDot = document.querySelector(".trakt-status");
                const traktStatusText = document.querySelector(
                    ".trakt-status + .status-text",
                );

                if (data.pmdb) {
                    pmdbStatusDot.classList.remove("status-red");
                    pmdbStatusDot.classList.add("status-green");
                    pmdbStatusText.innerText = `PublicMetaDb (${data.pmdb_user})`;
                } else {
                    pmdbStatusDot.classList.remove("status-green");
                    pmdbStatusDot.classList.add("status-red");
                    pmdbStatusText.innerText = "PublicMetaDb (Not Logged In)";

                    mark_form_as_hidden();
                }

                if (data.trakt) {
                    traktStatusDot.classList.remove("status-red");
                    traktStatusDot.classList.add("status-green");
                    traktStatusText.innerText = `Trakt (${data.trakt_user})`;
                } else {
                    traktStatusDot.classList.remove("status-green");
                    traktStatusDot.classList.add("status-red");
                    traktStatusText.innerText = "Trakt (Not Logged In)";

                    mark_form_as_hidden();
                }
            })
            .catch((error) => {
                console.error("Error checking PMDB authentication status:", error);
            });

        // Add click behavior to Trakt status text
        const traktStatusTextLink = document.querySelector(
            ".trakt-status + .status-text",
        );
        if (traktStatusTextLink) {
            traktStatusTextLink.addEventListener("click", () => {
                fetch("/trakt/auth")
                    .then((response) => response.json())
                    .then((data) => {
                        if (data.url) {
                            window.location.href = data.url; // Redirect to the authentication URL
                        } else {
                            alert("Failed to get authentication URL. Please try again.");
                        }
                    });
            });
        }

        // Add click behavior to PMDB status text
        const pmdbStatusTextLink = document.querySelector(
            ".pmdb-status + .status-text",
        );
        if (pmdbStatusTextLink) {
            pmdbStatusTextLink.addEventListener("click", () => {
                const apiKey = prompt("Please enter your PublicMetaDb API key:");
                if (apiKey) {
                    fetch("/pmdb/auth", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            Authorization: `Bearer ${apiKey}`,
                        },
                    })
                        .then((response) => response.json())
                        .then((data) => {
                            if (data.success) {
                                location.reload(); // Reload the page to update the status
                            } else {
                                alert("Failed to save API key. Please try again.");
                            }
                        });
                }
            });
        }

        function updateProgressBar(progress) {
            const progressBar = document.querySelector(".skill-bar");
            if (progressBar) {
                progressBar.style.setProperty("--bar-width", `${progress}%`);
                progressBar.setAttribute("data-progress", progress);
            }
        }

        // Track intentional page teardown so refresh/navigation does not trigger error cleanup.
        let isPageUnloading = false;
        window.addEventListener("beforeunload", () => {
            isPageUnloading = true;
        });
        window.addEventListener("pagehide", () => {
            isPageUnloading = true;
        });

        // Fetch migration event url from local storage and listen for updates
        const eventsUrl = localStorage.getItem("events_url");
        if (eventsUrl) {
            mark_form_as_hidden(); // Hide the form if there's an active migration
            const eventSource = new EventSource(eventsUrl);
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);

                // Append new logs to the existing logs in local storage
                if (data) {
                    const existingLogs = localStorage.getItem("migration_logs") || "";
                    const updatedLogs = existingLogs + JSON.stringify(data) + "\n";
                    localStorage.setItem("migration_logs", updatedLogs);

                    if (logsContainer.style.display === "block") {
                        logsContent.textContent = updatedLogs; // Update logs display if it's currently visible
                    }
                }

                if (data.progress) {
                    // Update the progress bar width based on the progress value (0-100)
                    updateProgressBar(data.progress);
                }
                if (data.status === "completed") {
                    alert("Migration completed!");
                    localStorage.removeItem("events_url"); // Clear the events URL from local storage
                    location.reload(); // Reload the page to reset the form and status indicators
                }
                if (data.status === "error") {
                    alert(`Migration had an error: ${data.message}`);
                }
            };
            eventSource.onerror = (error) => {
                if (isPageUnloading) {
                    eventSource.close();
                    return;
                }
                eventSource.close();
                console.error("Error with event source:", error);
                localStorage.removeItem("events_url"); // Clear the events URL from local storage
                alert("Connection lost. Please refresh the page.");
            };
        } else {
            // No active migration, ensure the progress bar is reset and hidden
            const progressBar = document.querySelector(".skill-bar");
            const progressBox = document.querySelector(".sf-skill");
            if (progressBar) {
                progressBar.style.setProperty("--bar-width", "0%");
                progressBar.setAttribute("data-progress", "0");
                progressBox.style.display = "none"; // Hide the progress box when not in use
            }
        }
    </script>
</body>

</html>
